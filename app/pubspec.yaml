publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations: 
    sdk: flutter

  dio: ^5.9.1
  flutter_bloc: ^9.1.1
  get_it: ^9.2.0
  equatable: ^2.0.8
